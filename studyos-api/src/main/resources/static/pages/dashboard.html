<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>StudyOS - Dashboard</title>

    <script>
        const Theme = (() => {
          const KEY = 'studyos-theme';
          const ROOT = document.documentElement;
          function getSystemPreference() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          function getSaved() {
            return localStorage.getItem(KEY) || getSystemPreference();
          }
          function apply(theme) {
            ROOT.setAttribute('data-theme', theme);
            document.querySelectorAll('[data-theme-label]').forEach((el) => {
              el.textContent = theme === 'dark' ? '☀️ Modo claro' : '🌙 Modo escuro';
            });
          }
          function set(theme) {
            localStorage.setItem(KEY, theme);
            apply(theme);
          }
          function toggle() {
            const current = ROOT.getAttribute('data-theme') || getSaved();
            set(current === 'dark' ? 'light' : 'dark');
          }
          function init() {
            apply(getSaved());
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
              if (!localStorage.getItem(KEY)) apply(e.matches ? 'dark' : 'light');
            });
          }
          return { init, toggle, set, getSaved };
        })();
        Theme.init();
    </script>

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body class="app">
<aside class="sidebar">
    <div class="logo">StudyOS</div>

    <nav>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="subjects.html">Materias</a>
        <a href="study.html">Metodos</a>
        <a href="flashcards.html">Flashcards</a>
        <a href="profile.html">Perfil</a>
    </nav>

    <div class="user-info" id="user-info"></div>

    <button class="theme-toggle" onclick="Theme.toggle()" aria-label="Alternar tema">
        <span class="theme-toggle-track">
            <span class="theme-toggle-thumb"></span>
        </span>
        <span data-theme-label>🌙 Modo escuro</span>
    </button>

    <button onclick="logout()" class="logout-btn">Sair</button>
</aside>

<main class="main">
    <section class="page-header">
        <div>
            <h1 class="page-title"><span id="greeting">Ola</span>, <span id="username"></span></h1>
            <p class="page-subtitle">Escolha seu ritmo, acompanhe seu progresso e continue evoluindo.</p>
        </div>

        <button class="btn btn-primary" onclick="window.location.href='study.html'">
            Iniciar estudo
        </button>
    </section>

    <section class="stats-grid">
        <article class="stat-card">
            <span class="stat-icon">XP</span>
            <div>
                <p class="stat-label">XP Total</p>
                <p class="stat-value" id="xp">0</p>
            </div>
        </article>

        <article class="stat-card">
            <span class="stat-icon">NV</span>
            <div>
                <p class="stat-label">Nivel</p>
                <p class="stat-value" id="level">1</p>
            </div>
        </article>

        <article class="stat-card">
            <span class="stat-icon">MAT</span>
            <div>
                <p class="stat-label">Materias</p>
                <p class="stat-value" id="subjects-count">0</p>
            </div>
        </article>
    </section>

    <section>
        <div class="section-header">
            <div>
                <h2>Suas Materias</h2>
                <p>Acompanhe onde voce ja esta estudando.</p>
            </div>

            <button class="btn btn-secondary" onclick="window.location.href='subjects.html'">
                Gerenciar
            </button>
        </div>

        <div class="subjects-list" id="subjects-list">
            <div class="empty-state">Carregando materias...</div>
        </div>
    </section>
</main>

<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
