<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessão de Estudo - StudyOS</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/session.css">
</head>
<body>

<header class="topbar">
    <div class="logo-area">
        <h2>StudyOS</h2>
    </div>

    <div class="topbar-right">
        <div id="user-info"></div>

        <button class="btn btn-danger" onclick="logout()">
            Sair
        </button>
    </div>
</header>

<main class="container session-main">

    <section class="card session-hero" id="session-hero">

        <div>
            <p class="session-label">
                Método ativo
            </p>

            <h1 id="method-name">
                Método
            </h1>

            <p id="method-description">
                Sessão de estudo em andamento.
            </p>
        </div>

        <div class="session-subject">
            <span>Matéria</span>

            <strong id="subject-name">
                Carregando...
            </strong>
        </div>

    </section>

    <section class="card timer-card">

        <div class="timer-ring" id="timer-ring">
            <div>
                <span id="timer-display">
                    00:00
                </span>

                <small id="timer-mode">
                    Foco
                </small>
            </div>
        </div>

        <div class="session-actions">

            <button
                    class="btn btn-secondary"
                    id="pause-btn"
            >
                Pausar
            </button>

            <button
                    class="btn btn-success"
                    id="finish-btn"
            >
                Finalizar sessão
            </button>

            <button
                    class="btn btn-danger"
                    id="cancel-btn"
            >
                Cancelar
            </button>

        </div>

    </section>

    <section class="card notes-card">

        <label>
            Anotações da sessão

            <textarea
                    id="session-notes"
                    rows="7"
                    placeholder="Escreva resumos, ideias, dificuldades, dúvidas..."
            ></textarea>
        </label>

    </section>

    <section class="card focus-card">

        <h3>
            Missão da sessão
        </h3>

        <ul class="focus-list">
            <li>
                Permanecer focado até o final
            </li>

            <li>
                Evitar trocar de aba
            </li>

            <li>
                Fazer anotações importantes
            </li>

            <li>
                Completar o tempo mínimo para ganhar XP
            </li>
        </ul>

    </section>

</main>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/session.js"></script>

</body>
</html>
