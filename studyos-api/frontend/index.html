<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>StudyOS</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/components.css" />
</head>
<body>
<main class="container">
    <section class="auth-box">
        <h1>StudyOS</h1>
        <p>Sua plataforma de organizacao e evolucao nos estudos.</p>

        <div id="login-form">
            <h2>Entrar</h2>

            <input class="input" type="email" id="email" placeholder="Email" autocomplete="email" />
            <input class="input" type="password" id="password" placeholder="Senha" autocomplete="current-password" />

            <button class="btn btn-primary" onclick="login()">Entrar</button>

            <p>Nao tem conta? <a href="#" onclick="showRegister()">Cadastrar</a></p>
        </div>

        <div id="register-form" style="display: none">
            <h2>Cadastrar</h2>

            <input class="input" type="text" id="reg-name" placeholder="Nome" autocomplete="name" />
            <input class="input" type="email" id="reg-email" placeholder="Email" autocomplete="email" />
            <input class="input" type="password" id="reg-password" placeholder="Senha" autocomplete="new-password" />

            <button class="btn btn-primary" onclick="register()">Cadastrar</button>

            <p>Ja tem conta? <a href="#" onclick="showLogin()">Entrar</a></p>
        </div>

        <p id="msg" class="form-message"></p>
    </section>
</main>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
